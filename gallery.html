<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Diana Vinansaca - Portfolio</title>
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
            <link rel="stylesheet" href="css/my-styles.css">
        </head>
        <body>

  
  
  
  
  
  
  
  
  
  
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f7f7f7;
      color: #333;
    }

    header {
      text-align: center;
      padding: 40px 20px;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1rem;
      color: #666;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px 40px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .card h3 {
      padding: 10px;
      font-size: 1rem;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 30px;
      font-size: 0.9rem;
      color: #777;
    }
  </style>
</head>

<body>

  <header>
    <h1>My Artwork Gallery</h1>
  </header>

  <section class="gallery">

    <div class="card">
      <img src="assets /Advertising-300dpi.jpg" alt="Artwork 1">
      <h3>Artwork Title 1</h3>
    </div>

    <div class="card">
      <img src="assets /pattern2-300dpi.jpg" alt="Artwork 2">
      <h3>Artwork Title 2</h3>
    </div>

    <div class="card">
      <img src="assets /Digital-art-300dpi.jpg" alt="Artwork 3">
      <h3>Artwork Title 3</h3>
    </div>

    <div class="card">
      <img src="assets /pattern-300dpi.jpg" alt="Artwork 4">
      <h3>Artwork Title 4</h3>
    </div>

  </section>

  <footer>
    <p>© 2026 My Portfolio</p>
  </footer>

</body>
</html>
